<!doctype html>
<html lang="en">
  <head>
    <!-- Base metadata -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App styling -->
    <link rel="stylesheet" href="css/style.css" />

    <title>To Do List</title>
  </head>
  <body>
    <!-- Page header -->
    <header>
      <h2>This is a to do list app</h2>
    </header>

    <!-- Main application container -->
    <div class="main-container">
      <!-- Input row: task text + default-done toggle + Add button -->
      <div class="input-container">
        <input
          type="text"
          id="myInput"
          placeholder="Add a new task..."
          autocomplete="off"
        />

        <!-- When checked, the new task is created as "done" -->
        <input type="checkbox" name="todo-item-done" id="MyCheckbox" />

        <button type="button" id="addButton" class="addBtn">Add</button>
      </div>

      <!-- Todo list rendered here by JavaScript -->
      <ul class="myTodo" id="todoList"></ul>
    </div>

    <!-- App logic (backend persistence: updates todos.txt via save.php) -->
    <script src="js/script.js"></script>
  </body>
</html>
