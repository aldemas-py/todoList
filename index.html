<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>To Do List</title>
  </head>
  <body>
    <header>
      <h2>This is a to do list app</h2>
    </header>
    <div class="main-container">
      <div class="input-container">
        <input
          type="text"
          id="myInput"
          placeholder="Add a new task..."
          autocomplete="off"
        />
        <input type="checkbox" name="todo-item-done" id="MyCheckbox" />
        <button type="button" id="addButton" class="addBtn">Add</button>
      </div>

      <ul class="myTodo" id="todoList">

          <li class="myUL todo-items">
            <input
              type="checkbox"
              name="todo-item-done"
              id="todo-item-done-1"
              class="old-class-checkbox"
            />
            <label class="todo-item-done" id="todo-item-label"></label>
          </li>
        </ul>
      </ul>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
